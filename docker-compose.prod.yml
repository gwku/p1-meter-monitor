version: '3.8'

services:
  questdb:
    image: questdb/questdb:latest
    container_name: p1-questdb
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_PG_USER=admin
      - QDB_PG_PASSWORD=quest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000 || exit 1'"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - p1-network

  p1-meter-monitor:
    image: ghcr.io/gwku/p1-meter-monitor:${IMAGE_TAG:-latest}
    container_name: p1-meter-monitor
    volumes:
      - ./output:/output
      - ./logs:/var/log
    env_file:
      - .env
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=quest
    depends_on:
      - questdb
    restart: unless-stopped
    networks:
      - p1-network

networks:
  p1-network:
    driver: bridge

volumes:
  questdb_data:
    driver: local

