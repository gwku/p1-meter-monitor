version: '3.8'

services:
  questdb:
    image: questdb/questdb:latest
    container_name: p1-questdb
    # Ports not exposed in production - access via Docker network only
    # To access QuestDB console, use: docker-compose exec or port forward
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_PG_USER=admin
      - QDB_PG_PASSWORD=quest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9000/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - p1-network

  p1-meter-monitor:
    # Use pre-built image from GitHub Container Registry
    # Replace 'yourusername/p1-meter-monitor' with your actual GitHub username/repo
    image: ghcr.io/${GITHUB_REPOSITORY:-yourusername/p1-meter-monitor}:${IMAGE_TAG:-latest}
    container_name: p1-meter-monitor
    volumes:
      - ./output:/output
      - ./logs:/var/log
    env_file:
      - .env
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=quest
    depends_on:
      - questdb
    restart: unless-stopped
    networks:
      - p1-network

networks:
  p1-network:
    driver: bridge

volumes:
  questdb_data:
    driver: local

